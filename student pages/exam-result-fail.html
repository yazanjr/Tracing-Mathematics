<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examify — Exam Result</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../style/style.css">
<link rel="stylesheet" href="./student-result.css">
</head>
<body>

<div class="result-page">

  <header class="result-header">
    <img class="result-header__logo-img" src="./assets/Examify.png" alt="Examify logo">
    <span class="result-header__logo-text">Examify</span>
  </header>

  <main class="result-content">
    <div class="result-icon result-icon--fail">
      <i class="far fa-face-frown"></i>
    </div>

    <h1 class="result-title">Unfortunately,</h1>
    <p class="result-subtitle">You did not passed the exam</p>

    <p class="result-score">14/30</p>

    <div class="result-actions">
      <a href="review-answers.html" class="btn btn--secondary">Review Exam</a>
      <a href="student-dashboard.html" class="btn btn--primary">Back to dashboard</a>
    </div>
  </main>

</div>

</body>
</html>
