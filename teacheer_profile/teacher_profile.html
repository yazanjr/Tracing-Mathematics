<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Teacher Profile</title>

    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="teacher_profile.css">

    <script type="module" src="teacher_profile.js" defer></script>
</head>

<body>

    <main class="profile-page">

        <section class="profile-card">

            <div class="profile-card-header"></div>

            <div class="profile-card-content">

                <a class="back-dashboard-button" href="../teacher_dashbors/teacher_dashbors.html">
                    Back to dashboard
                </a>

                <span class="profile-role">
                    Teacher
                </span>

                <div class="profile-main-info">

                    <svg
                        class="profile-icon"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.6"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                    >
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="9" r="3.2"></circle>
                        <path d="M5.8 19c1.1-3.4 3.2-5.1 6.2-5.1s5.1 1.7 6.2 5.1"></path>
                    </svg>

                    <h1 class="profile-name" id="teacherName">
                        Teacher Name
                    </h1>

                    <p class="profile-email" id="teacherMainEmail">
                        teacher@email.com
                    </p>

                </div>

                <hr class="profile-divider">

                <div class="profile-details-grid">

                    <article class="profile-detail-card">
                        <span class="profile-detail-label">
                            Teacher ID
                        </span>

                        <span class="profile-detail-value" id="teacherId">
                            —
                        </span>
                    </article>

                    <article class="profile-detail-card">
                        <span class="profile-detail-label">
                            Email
                        </span>

                        <span class="profile-detail-value" id="teacherEmail">
                            —
                        </span>
                    </article>

                    <article class="profile-detail-card">
                        <span class="profile-detail-label">
                            National ID
                        </span>

                        <span class="profile-detail-value" id="teacherNationalId">
                            —
                        </span>
                    </article>

                    <article class="profile-detail-card">
                        <span class="profile-detail-label">
                            Mobile number
                        </span>

                        <span class="profile-detail-value" id="teacherPhone">
                            —
                        </span>
                    </article>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
