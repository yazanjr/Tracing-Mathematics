<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exam Builder</title>

    <link rel="stylesheet" href="examBuilder.css">

    <script type="module" src="examBuilder.js" defer></script>
</head>

<body>

<div class="dashboard-shell">

    <aside class="sidebar">

        <div class="brand">
            <div class="brand-logo-wrap">
                <img
                    class="brand-logo"
                    src="../pic/logo.png"
                    alt="Examify"
                >
            </div>
        </div>

        <nav class="side-nav">

            <a class="nav-link" href="../teacher_dashbors/teacher_dashbors.html">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                </svg>

                <span>Dashboard</span>
            </a>

            <a class="nav-link active" href="../examBuilder/examBuilder.html">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <path d="M4 20h16"></path>
                    <path d="M6 16l8-8 4 4-8 8H6v-4z"></path>
                </svg>

                <span>Exam Builder</span>
            </a>

            <a class="nav-link" href="../addStudent/addStudent.html">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <circle cx="9" cy="8" r="3"></circle>
                    <path d="M3 19c.5-4 2.5-6 6-6s5.5 2 6 6"></path>
                    <path d="M17 8v6"></path>
                    <path d="M14 11h6"></path>
                </svg>

                <span>Add Student</span>
            </a>

            <a class="nav-link" href="../Student_results/Student_results.html">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <path d="M4 19h16"></path>
                    <path d="M6 17V9"></path>
                    <path d="M12 17V4"></path>
                    <path d="M18 17v-6"></path>
                </svg>

                <span>Students Results</span>
            </a>

        </nav>

        <div class="sidebar-bottom">

            <a class="nav-link" href="../teacheer_profile/teacher_profile.html">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <circle cx="12" cy="8" r="3"></circle>
                    <path d="M5 20c.7-4 3-6 7-6s6.3 2 7 6"></path>
                </svg>

                <span class="profName"></span>
            </a>

            <a class="nav-link" href="#">
                <svg
                    class="nav-icon"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    viewBox="0 0 24 24"
                >
                    <path d="M10 17l5-5-5-5"></path>
                    <path d="M15 12H3"></path>
                    <path d="M14 4h6v16h-6"></path>
                </svg>

                <span>Sign out</span>
            </a>

        </div>

    </aside>

    <main class="main-area">

        <header class="topbar">

            <div class="topbar-title">Students</div>

            <div class="topbar-actions">
                <button class="btn" type="button">
                    Sign Out
                </button>

                <button class="btn btn-primary" type="button">
                    New Exam
                </button>
            </div>

        </header>

        <section class="content exam-builder-content">

            <div class="exam-builder-heading">

                <div>
                    <h1 class="exam-builder-title">
                        Exam Builder
                    </h1>

                    <p class="exam-builder-subtitle">
                        Configure and compose your exam below.
                    </p>
                </div>

                <button
                    class="save-exam-button"
                    type="submit"
                    form="examBuilderForm"
                >
                    Save Exam
                </button>

            </div>

            <form class="exam-builder-form" id="examBuilderForm">

                <section class="exam-details-card">

                    <h2 class="exam-section-title">
                        Exam Details
                    </h2>

                    <div class="exam-details-grid">

                        <div class="exam-form-group">
                            <label for="examTitle">Title</label>

                            <input
                                class="exam-form-input"
                                id="examTitle"
                                name="examTitle"
                                type="text"
                                required
                            >
                        </div>

                        <div class="exam-form-group">
                            <label for="examWeight">Exam weight</label>

                            <input
                                class="exam-form-input"
                                id="examWeight"
                                name="examWeight"
                                type="number"
                                min="0"
                                max="100"
                                required
                            >
                        </div>

                        <div class="exam-form-group">
                            <label for="examDate">Date</label>

                            <input
                                class="exam-form-input"
                                id="examDate"
                                name="examDate"
                                type="date"
                                required
                            >
                        </div>

                        <div class="exam-form-group">
                            <label for="examDuration">Duration</label>

                            <input
                                class="exam-form-input"
                                id="examDuration"
                                name="examDuration"
                                type="number"
                                min="1"
                                placeholder="Minutes"
                                required
                            >
                        </div>

                        <div class="exam-form-group exam-description-group">
                            <label for="examDescription">Description</label>

                            <textarea
                                class="exam-form-textarea"
                                id="examDescription"
                                name="examDescription"
                                rows="3"
                            ></textarea>
                        </div>

                    </div>

                </section>

                <section class="questions-container" id="questionsContainer">

    <!-- 1. Multiple Choice -->
    <article class="question-card" data-question-type="multiple-choice">

        <header class="question-header">

            <span class="question-number">Q1</span>

            <div class="question-header-actions">

                <select
                    class="question-type-select"
                    name="questionType1"
                    aria-label="Question type"
                >
                    <option value="multiple-choice" selected>
                        Multiple Choice
                    </option>

                    <option value="true-false">
                        True or False
                    </option>

                    <option value="multi-select">
                        Multi-select
                    </option>

                    <option value="short-answer">
                        Short Answer
                    </option>
                </select>

                <label class="points-label" for="questionPoints1">
                    Points:
                </label>

                <input
                    class="points-input"
                    id="questionPoints1"
                    name="questionPoints1"
                    type="number"
                    min="1"
                    value="5"
                >

                <button
                    class="delete-question-button"
                    type="button"
                    aria-label="Delete question"
                >
                    <svg
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        viewBox="0 0 24 24"
                    >
                        <path d="M4 7h16"></path>
                        <path d="M9 7V4h6v3"></path>
                        <path d="M7 7l1 13h8l1-13"></path>
                    </svg>
                </button>

            </div>

        </header>

        <div class="question-body">

            <input
                class="question-text-input"
                name="questionText1"
                type="text"
                value="What is the capital of Jordan?"
                placeholder="Enter your question"
            >

            <p class="question-help">
                Select one correct answer.
            </p>

            <div class="answers-grid">

                <label class="answer-option">
                    <input
                        type="radio"
                        name="correctAnswer1"
                        value="Amman"
                        checked
                    >

                    <input
                        class="answer-input"
                        name="question1Option1"
                        type="text"
                        value="Amman"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="radio"
                        name="correctAnswer1"
                        value="Aqaba"
                    >

                    <input
                        class="answer-input"
                        name="question1Option2"
                        type="text"
                        value="Aqaba"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="radio"
                        name="correctAnswer1"
                        value="Irbid"
                    >

                    <input
                        class="answer-input"
                        name="question1Option3"
                        type="text"
                        value="Irbid"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="radio"
                        name="correctAnswer1"
                        value="Zarqa"
                    >

                    <input
                        class="answer-input"
                        name="question1Option4"
                        type="text"
                        value="Zarqa"
                    >
                </label>

            </div>

        </div>

    </article>


    <!-- 2. True or False -->
    <article class="question-card" data-question-type="true-false">

        <header class="question-header">

            <span class="question-number">Q2</span>

            <div class="question-header-actions">

                <select
                    class="question-type-select"
                    name="questionType2"
                    aria-label="Question type"
                >
                    <option value="multiple-choice">
                        Multiple Choice
                    </option>

                    <option value="true-false" selected>
                        True or False
                    </option>

                    <option value="multi-select">
                        Multi-select
                    </option>

                    <option value="short-answer">
                        Short Answer
                    </option>
                </select>

                <label class="points-label" for="questionPoints2">
                    Points:
                </label>

                <input
                    class="points-input"
                    id="questionPoints2"
                    name="questionPoints2"
                    type="number"
                    min="1"
                    value="2"
                >

                <button
                    class="delete-question-button"
                    type="button"
                    aria-label="Delete question"
                >
                    <svg
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        viewBox="0 0 24 24"
                    >
                        <path d="M4 7h16"></path>
                        <path d="M9 7V4h6v3"></path>
                        <path d="M7 7l1 13h8l1-13"></path>
                    </svg>
                </button>

            </div>

        </header>

        <div class="question-body">

            <input
                class="question-text-input"
                name="questionText2"
                type="text"
                value="The Earth revolves around the Sun."
                placeholder="Enter your question"
            >

            <p class="question-help">
                Select the correct answer.
            </p>

            <div class="boolean-options">

                <label class="boolean-option">
                    <input
                        type="radio"
                        name="correctAnswer2"
                        value="true"
                        checked
                    >

                    <span>True</span>
                </label>

                <label class="boolean-option">
                    <input
                        type="radio"
                        name="correctAnswer2"
                        value="false"
                    >

                    <span>False</span>
                </label>

            </div>

        </div>

    </article>


    <!-- 3. Multi-select -->
    <article class="question-card" data-question-type="multi-select">

        <header class="question-header">

            <span class="question-number">Q3</span>

            <div class="question-header-actions">

                <select
                    class="question-type-select"
                    name="questionType3"
                    aria-label="Question type"
                >
                    <option value="multiple-choice">
                        Multiple Choice
                    </option>

                    <option value="true-false">
                        True or False
                    </option>

                    <option value="multi-select" selected>
                        Multi-select
                    </option>

                    <option value="short-answer">
                        Short Answer
                    </option>
                </select>

                <label class="points-label" for="questionPoints3">
                    Points:
                </label>

                <input
                    class="points-input"
                    id="questionPoints3"
                    name="questionPoints3"
                    type="number"
                    min="1"
                    value="6"
                >

                <button
                    class="delete-question-button"
                    type="button"
                    aria-label="Delete question"
                >
                    <svg
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        viewBox="0 0 24 24"
                    >
                        <path d="M4 7h16"></path>
                        <path d="M9 7V4h6v3"></path>
                        <path d="M7 7l1 13h8l1-13"></path>
                    </svg>
                </button>

            </div>

        </header>

        <div class="question-body">

            <input
                class="question-text-input"
                name="questionText3"
                type="text"
                value="Which of the following are programming languages?"
                placeholder="Enter your question"
            >

            <p class="question-help">
                Select all correct answers.
            </p>

            <div class="answers-grid">

                <label class="answer-option">
                    <input
                        type="checkbox"
                        name="correctAnswers3"
                        value="JavaScript"
                        checked
                    >

                    <input
                        class="answer-input"
                        name="question3Option1"
                        type="text"
                        value="JavaScript"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="checkbox"
                        name="correctAnswers3"
                        value="Python"
                        checked
                    >

                    <input
                        class="answer-input"
                        name="question3Option2"
                        type="text"
                        value="Python"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="checkbox"
                        name="correctAnswers3"
                        value="HTML"
                    >

                    <input
                        class="answer-input"
                        name="question3Option3"
                        type="text"
                        value="HTML"
                    >
                </label>

                <label class="answer-option">
                    <input
                        type="checkbox"
                        name="correctAnswers3"
                        value="Java"
                        checked
                    >

                    <input
                        class="answer-input"
                        name="question3Option4"
                        type="text"
                        value="Java"
                    >
                </label>

            </div>

        </div>

    </article>


    <!-- 4. Short Answer -->
    <article class="question-card" data-question-type="short-answer">

        <header class="question-header">

            <span class="question-number">Q4</span>

            <div class="question-header-actions">

                <select
                    class="question-type-select"
                    name="questionType4"
                    aria-label="Question type"
                >
                    <option value="multiple-choice">
                        Multiple Choice
                    </option>

                    <option value="true-false">
                        True or False
                    </option>

                    <option value="multi-select">
                        Multi-select
                    </option>

                    <option value="short-answer" selected>
                        Short Answer
                    </option>
                </select>

                <label class="points-label" for="questionPoints4">
                    Points:
                </label>

                <input
                    class="points-input"
                    id="questionPoints4"
                    name="questionPoints4"
                    type="number"
                    min="1"
                    value="4"
                >

                <button
                    class="delete-question-button"
                    type="button"
                    aria-label="Delete question"
                >
                    <svg
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        viewBox="0 0 24 24"
                    >
                        <path d="M4 7h16"></path>
                        <path d="M9 7V4h6v3"></path>
                        <path d="M7 7l1 13h8l1-13"></path>
                    </svg>
                </button>

            </div>

        </header>

        <div class="question-body">

            <input
                class="question-text-input"
                name="questionText4"
                type="text"
                value="Explain the difference between let and const."
                placeholder="Enter your question"
            >

            <p class="question-help">
                Enter an example correct answer.
            </p>

            <textarea
                class="short-answer-input"
                name="correctAnswer4"
                placeholder="Enter the expected answer"
            >let allows reassignment, while const does not allow the variable to be reassigned.</textarea>

        </div>

    </article>

</section>

                <button
                    class="add-question-button"
                    id="addQuestionButton"
                    type="button"
                >
                    <span>Add Question</span>

                    <svg
                        class="add-question-icon"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        viewBox="0 0 24 24"
                    >
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                </button>

            </form>

        </section>

    </main>

</div>

<script type="module" src="./examBuilder.js"></script>

</body>
</html>
